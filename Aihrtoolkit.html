<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR AI Prompt Reference Card</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  /* ── DARK MODE (default) ── */
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #6b7280;
    --c1: #00d4aa;
    --c2: #4f8ef7;
    --c3: #a78bfa;
    --c4: #34d399;
    --c1-dim: rgba(0,212,170,0.12);
    --c2-dim: rgba(79,142,247,0.12);
    --c3-dim: rgba(167,139,250,0.12);
    --c4-dim: rgba(52,211,153,0.12);
    --grid-line: rgba(0,212,170,0.04);
    --shadow: rgba(0,0,0,0.4);
    --code-bg: #0d1117;
    --code-text: #a8d8c8;
    --tab-active-text: #0a0c10;
    --modal-bg: #111318;
  }

  /* ── LIGHT MODE ── */
  html.light {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: rgba(0,0,0,0.08);
    --text: #1a1d2e;
    --muted: #7c8493;
    --c1: #00a886;
    --c2: #2d6edc;
    --c3: #7c3aed;
    --c4: #059669;
    --c1-dim: rgba(0,168,134,0.10);
    --c2-dim: rgba(45,110,220,0.10);
    --c3-dim: rgba(124,58,237,0.10);
    --c4-dim: rgba(5,150,105,0.10);
    --grid-line: rgba(0,168,134,0.06);
    --shadow: rgba(0,0,0,0.10);
    --code-bg: #f0f4f8;
    --code-text: #1a4a3a;
    --tab-active-text: #ffffff;
    --modal-bg: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Anuphan', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.35s, color 0.35s;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ─── GRID BACKGROUND ─── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    transition: background-image 0.3s;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 56px;
    flex-wrap: wrap;
  }

  .header-left { flex: 1; min-width: 280px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--c1-dim);
    border: 1px solid rgba(0,212,170,0.3);
    color: var(--c1);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
    animation: fadeDown 0.5s ease both;
  }
  .badge::before { content: '●'; font-size: 7px; animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    animation: fadeDown 0.5s 0.1s ease both;
  }
  h1 span { color: var(--c1); }

  .subtitle {
    margin-top: 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
    animation: fadeDown 0.5s 0.3s ease both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--c1);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* Search */
  .search-wrap {
    position: relative;
    width: 280px;
    animation: fadeDown 0.5s 0.25s ease both;
    flex-shrink: 0;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'Anuphan', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(0,212,170,0.5); }
  #search::placeholder { color: var(--muted); }

  /* ─── SECTION TABS ─── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    animation: fadeDown 0.5s 0.35s ease both;
  }
  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Anuphan', sans-serif;
  }
  .tab:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .tab.active { color: var(--tab-active-text); font-weight: 600; }
  .tab[data-section="all"].active { background: var(--text); border-color: var(--text); color: var(--bg); }
  .tab[data-section="recruitment"].active { background: var(--c1); border-color: var(--c1); }
  .tab[data-section="development"].active { background: var(--c2); border-color: var(--c2); }
  .tab[data-section="performance"].active { background: var(--c3); border-color: var(--c3); }
  .tab[data-section="retention"].active { background: var(--c4); border-color: var(--c4); }

  /* ─── SECTION DIVIDER ─── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 36px 0 20px;
  }
  .section-divider h2 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .section-divider .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-divider .count {
    font-size: 11px;
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  /* ─── CARD GRID ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px var(--shadow);
  }
  .card:hover::before { opacity: 1; }

  .card[data-section="recruitment"]::before { background: var(--c1); }
  .card[data-section="recruitment"]:hover { border-color: rgba(0,212,170,0.3); }
  .card[data-section="development"]::before { background: var(--c2); }
  .card[data-section="development"]:hover { border-color: rgba(79,142,247,0.3); }
  .card[data-section="performance"]::before { background: var(--c3); }
  .card[data-section="performance"]:hover { border-color: rgba(167,139,250,0.3); }
  .card[data-section="retention"]::before { background: var(--c4); }
  .card[data-section="retention"]:hover { border-color: rgba(52,211,153,0.3); }

  .card-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  .card[data-section="recruitment"] .card-num { color: var(--c1); }
  .card[data-section="development"] .card-num { color: var(--c2); }
  .card[data-section="performance"] .card-num { color: var(--c3); }
  .card[data-section="retention"] .card-num { color: var(--c4); }

  .card-icon {
    font-size: 24px;
    margin-bottom: 10px;
    display: block;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
    color: var(--text);
  }

  .card-desc {
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .card[data-section="recruitment"] .tag { background: var(--c1-dim); color: var(--c1); }
  .card[data-section="development"] .tag { background: var(--c2-dim); color: var(--c2); }
  .card[data-section="performance"] .tag { background: var(--c3-dim); color: var(--c3); }
  .card[data-section="retention"] .tag { background: var(--c4-dim); color: var(--c4); }

  .card-arrow {
    position: absolute;
    bottom: 18px; right: 18px;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: translateX(-4px);
  }
  .card:hover .card-arrow { opacity: 0.5; transform: translateX(0); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--modal-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    max-height: 88vh;
    overflow-y: auto;
    transform: scale(0.95) translateY(16px);
    transition: transform 0.25s;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    padding: 28px 28px 0;
    position: sticky; top: 0;
    background: var(--modal-bg);
    z-index: 1;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.35s;
  }
  .modal-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .modal-num {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .modal-title { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .close-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .close-btn:hover { background: var(--surface2); color: var(--text); }

  .modal-obj {
    margin-top: 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.6;
  }

  .modal-body { padding: 24px 28px 28px; }

  .prompt-block { margin-bottom: 24px; }
  .prompt-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .prompt-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .prompt-code {
    background: var(--code-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    font-family: 'Sarabun', monospace;
    font-size: 13px;
    line-height: 1.8;
    color: var(--code-text);
    white-space: pre-wrap;
    word-break: break-word;
    transition: background 0.35s, color 0.35s;
  }
  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Anuphan', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .copy-btn.copied { color: var(--c1); border-color: rgba(0,212,170,0.4); background: var(--c1-dim); }

  .tip-box {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 10px;
    border-left: 3px solid;
    background: rgba(255,255,255,0.03);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    line-height: 1.7;
  }
  .tip-box strong { font-weight: 600; display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Section colors for modal */
  .modal[data-section="recruitment"] .modal-num,
  .modal[data-section="recruitment"] .prompt-label { color: var(--c1); }
  .modal[data-section="recruitment"] .prompt-label::before { background: var(--c1); }
  .modal[data-section="recruitment"] .tip-box { border-color: var(--c1); }
  .modal[data-section="recruitment"] .tip-box strong { color: var(--c1); }

  .modal[data-section="development"] .modal-num,
  .modal[data-section="development"] .prompt-label { color: var(--c2); }
  .modal[data-section="development"] .prompt-label::before { background: var(--c2); }
  .modal[data-section="development"] .tip-box { border-color: var(--c2); }
  .modal[data-section="development"] .tip-box strong { color: var(--c2); }

  .modal[data-section="performance"] .modal-num,
  .modal[data-section="performance"] .prompt-label { color: var(--c3); }
  .modal[data-section="performance"] .prompt-label::before { background: var(--c3); }
  .modal[data-section="performance"] .tip-box { border-color: var(--c3); }
  .modal[data-section="performance"] .tip-box strong { color: var(--c3); }

  .modal[data-section="retention"] .modal-num,
  .modal[data-section="retention"] .prompt-label { color: var(--c4); }
  .modal[data-section="retention"] .prompt-label::before { background: var(--c4); }
  .modal[data-section="retention"] .tip-box { border-color: var(--c4); }
  .modal[data-section="retention"] .tip-box strong { color: var(--c4); }

  .modal-nav {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .modal-nav button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Anuphan', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-nav button:hover { border-color: rgba(255,255,255,0.2); }
  .modal-nav button:disabled { opacity: 0.3; cursor: default; }

  /* ─── EMPTY STATE ─── */
  .empty { text-align: center; padding: 64px 24px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeDown { from { opacity:0; transform: translateY(-12px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }

  /* ─── THEME TOGGLE ─── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Anuphan', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 4px;
    animation: fadeDown 0.5s 0.3s ease both;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .theme-toggle:hover {
    border-color: var(--c1);
    color: var(--c1);
    box-shadow: 0 4px 16px var(--shadow);
  }
  .theme-icon { font-size: 15px; line-height: 1; transition: transform 0.4s; }
  .theme-toggle:hover .theme-icon { transform: rotate(20deg); }

  /* light mode adjustments */
  html.light .tab:hover { border-color: rgba(0,0,0,0.2); }
  html.light .card:hover { box-shadow: 0 8px 32px var(--shadow); }
  html.light .modal { border-color: rgba(0,0,0,0.08); }
  html.light .prompt-code { border-color: rgba(0,0,0,0.08); }
  html.light .close-btn:hover { background: var(--surface2); }
  html.light .modal-nav button:hover { border-color: rgba(0,0,0,0.25); }
  html.light body::before { opacity: 0.015; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="badge">HR × AI Toolkit</div>
      <h1>Prompt Reference<br><span>Dashboard</span></h1>
      <p class="subtitle">คู่มือ Prompt สำหรับงาน HR ครบทุกกระบวนการ — คลิกที่หัวข้อเพื่อดูตัวอย่าง Prompt</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">20</div><div class="stat-label">หัวข้อ</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">หมวด</div></div>
        <div class="stat"><div class="stat-num">35+</div><div class="stat-label">Prompt</div></div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="ค้นหาหัวข้อ...">
    </div>
    <button class="theme-toggle" id="theme-toggle" title="สลับธีม">
      <span class="theme-icon">☀️</span>
      <span class="theme-label">Light</span>
    </button>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-section="all">ทั้งหมด</button>
    <button class="tab" data-section="recruitment">🟢 การสรรหา</button>
    <button class="tab" data-section="development">🔵 การพัฒนา</button>
    <button class="tab" data-section="performance">🟣 ผลงาน</button>
    <button class="tab" data-section="retention">🌿 รักษาพนักงาน</button>
  </div>

  <!-- Cards container -->
  <div id="cards-container"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-top-row">
        <div>
          <div class="modal-num" id="modal-num"></div>
          <div class="modal-title" id="modal-title"></div>
        </div>
        <button class="close-btn" id="close-btn">✕</button>
      </div>
      <div class="modal-obj" id="modal-obj"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DATA = [
  // ── RECRUITMENT ──
  {
    id: "4.1", section: "recruitment",
    icon: "📋", title: "Job Description (JD)",
    shortTitle: "เขียน JD",
    desc: "สร้าง Job Description ที่ครบถ้วน ดึงดูด และสอดคล้องกับ Competency ขององค์กร",

const SECTIONS = {
  recruitment: { label: "การสรรหาและคัดเลือก", color: "var(--c1)" },
  development:  { label: "การพัฒนาบุคลากร",    color: "var(--c2)" },
  performance:  { label: "การบริหารผลงาน",      color: "var(--c3)" },
  retention:    { label: "การจูงใจและรักษา",    color: "var(--c4)" }
};

let activeSection = "all";
let activeIdx = -1;
let filteredData = [...DATA];

// ── Build UI ──
function renderCards(data) {
  const container = document.getElementById("cards-container");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>ไม่พบหัวข้อที่ค้นหา</p></div>`;
    return;
  }

  // Group by section
  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.section]) grouped[item.section] = [];
    grouped[item.section].push(item);
  });

  let delay = 0;
  Object.entries(grouped).forEach(([sec, items]) => {
    // Section divider
    const divider = document.createElement("div");
    divider.className = "section-divider";
    divider.innerHTML = `
      <div class="line"></div>
      <h2 style="color:${SECTIONS[sec].color}">${SECTIONS[sec].label}</h2>
      <span class="count">${items.length} หัวข้อ</span>
      <div class="line"></div>`;
    container.appendChild(divider);

    // Grid
    const grid = document.createElement("div");
    grid.className = "cards-grid";

    items.forEach((item) => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.section = item.section;
      card.style.animationDelay = `${delay * 40}ms`;
      delay++;

      const tagsHtml = item.tags.map(t => `<span class="tag">${t}</span>`).join("");
      card.innerHTML = `
        <div class="card-num">${item.id}</div>
        <span class="card-icon">${item.icon}</span>
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-tags">${tagsHtml}</div>
        <span class="card-arrow">→</span>`;

      card.addEventListener("click", () => openModal(DATA.indexOf(item)));
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

// ── Modal ──
function openModal(idx) {
  activeIdx = idx;
  const item = DATA[idx];
  const overlay = document.getElementById("modal-overlay");
  const modal = document.getElementById("modal");

  modal.dataset.section = item.section;
  document.getElementById("modal-num").textContent = `หัวข้อ ${item.id} · ${SECTIONS[item.section].label}`;
  document.getElementById("modal-title").textContent = `${item.icon} ${item.title}`;
  document.getElementById("modal-obj").textContent = `วัตถุประสงค์: ${item.desc}`;

  const body = document.getElementById("modal-body");
  let html = "";

  item.prompts.forEach((p, i) => {
    html += `
      <div class="prompt-block">
        <div class="prompt-label">Prompt ${item.prompts.length > 1 ? (i + 1) : ""}: ${p.label}</div>
        <div class="prompt-code" id="prompt-code-${i}">${escapeHtml(p.text)}<button class="copy-btn" data-idx="${i}">คัดลอก</button></div>
      </div>`;
  });

  html += `<div class="tip-box"><strong>💡 เคล็ดลับ</strong>${item.tip}</div>`;
  html += `<div class="modal-nav">
    <button id="prev-btn" ${idx === 0 ? "disabled" : ""}>← ก่อนหน้า</button>
    <button id="next-btn" ${idx === DATA.length - 1 ? "disabled" : ""}>ถัดไป →</button>
  </div>`;

  body.innerHTML = html;

  // Copy buttons
  body.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const i = +btn.dataset.idx;
      navigator.clipboard.writeText(item.prompts[i].text).then(() => {
        btn.textContent = "✓ คัดลอกแล้ว";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "คัดลอก"; btn.classList.remove("copied"); }, 2000);
      });
    });
  });

  // Nav buttons
  document.getElementById("prev-btn")?.addEventListener("click", () => openModal(idx - 1));
  document.getElementById("next-btn")?.addEventListener("click", () => openModal(idx + 1));

  overlay.classList.add("open");
  modal.scrollTop = 0;
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── Filtering ──
function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  filteredData = DATA.filter(item => {
    const matchSection = activeSection === "all" || item.section === activeSection;
    const matchSearch = !q || item.title.toLowerCase().includes(q)
      || item.desc.toLowerCase().includes(q)
      || item.id.includes(q)
      || item.tags.some(t => t.toLowerCase().includes(q));
    return matchSection && matchSearch;
  });
  renderCards(filteredData);
}

// ── Events ──
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeSection = tab.dataset.section;
    applyFilters();
  });
});

document.getElementById("search").addEventListener("input", applyFilters);

document.getElementById("close-btn").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight" && activeIdx >= 0 && activeIdx < DATA.length - 1) openModal(activeIdx + 1);
  if (e.key === "ArrowLeft" && activeIdx > 0) openModal(activeIdx - 1);
});

// ── Theme Toggle ──
const html = document.documentElement;
const toggleBtn = document.getElementById("theme-toggle");
const themeIcon = toggleBtn.querySelector(".theme-icon");
const themeLabel = toggleBtn.querySelector(".theme-label");
let isLight = false;

function applyTheme(light) {
  isLight = light;
  if (light) {
    html.classList.add("light");
    themeIcon.textContent = "🌙";
    themeLabel.textContent = "Dark";
    toggleBtn.title = "เปลี่ยนเป็น Dark Mode";
  } else {
    html.classList.remove("light");
    themeIcon.textContent = "☀️";
    themeLabel.textContent = "Light";
    toggleBtn.title = "เปลี่ยนเป็น Light Mode";
  }
  localStorage.setItem("hrDashTheme", light ? "light" : "dark");
}

toggleBtn.addEventListener("click", () => applyTheme(!isLight));

// Restore saved preference
const saved = localStorage.getItem("hrDashTheme");
if (saved === "light") applyTheme(true);

// ── Init ──
renderCards(DATA);
</script>
